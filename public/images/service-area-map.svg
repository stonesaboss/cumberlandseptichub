<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" role="img" aria-label="Illustrated map of the Upper Cumberland region of Tennessee showing Cookeville, Crossville, Sparta, Livingston, Smithville, Baxter, Monterey and Algood">
  <defs>
    <linearGradient id="region" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf3ee"/>
      <stop offset="1" stop-color="#d9ebe0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="640" fill="#f3f7f8"/>

  <!-- stylized regional boundary -->
  <path d="M120 130 L300 90 L470 110 L640 80 L800 140 L830 300 L780 470 L620 550 L430 570 L250 520 L110 420 L90 260 Z"
        fill="url(#region)" stroke="#2f8f55" stroke-width="4" stroke-linejoin="round" stroke-dasharray="14 8"/>

  <!-- roads -->
  <g stroke="#b9cdd8" stroke-width="7" fill="none" stroke-linecap="round">
    <path d="M170 380 Q 330 330 450 310 T 760 260"/>
    <path d="M450 310 Q 470 420 500 500"/>
    <path d="M450 310 Q 420 200 400 150"/>
    <path d="M450 310 Q 330 430 260 470"/>
  </g>

  <!-- city markers -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-weight="700" fill="#0d2942">
    <!-- Cookeville: primary -->
    <circle cx="450" cy="310" r="17" fill="#2f8f55" stroke="#ffffff" stroke-width="4"/>
    <text x="450" y="278" font-size="26" text-anchor="middle">Cookeville</text>

    <!-- Crossville -->
    <circle cx="700" cy="415" r="13" fill="#1f5275" stroke="#ffffff" stroke-width="4"/>
    <text x="700" y="453" font-size="22" text-anchor="middle">Crossville</text>

    <!-- Sparta -->
    <circle cx="460" cy="490" r="11" fill="#1f5275" stroke="#ffffff" stroke-width="4"/>
    <text x="460" y="525" font-size="20" text-anchor="middle">Sparta</text>

    <!-- Livingston -->
    <circle cx="470" cy="140" r="11" fill="#1f5275" stroke="#ffffff" stroke-width="4"/>
    <text x="470" y="120" font-size="20" text-anchor="middle">Livingston</text>

    <!-- Smithville -->
    <circle cx="215" cy="450" r="11" fill="#1f5275" stroke="#ffffff" stroke-width="4"/>
    <text x="215" y="487" font-size="20" text-anchor="middle">Smithville</text>

    <!-- Baxter -->
    <circle cx="330" cy="330" r="9" fill="#7fb99a" stroke="#ffffff" stroke-width="3"/>
    <text x="330" y="365" font-size="17" text-anchor="middle">Baxter</text>

    <!-- Algood -->
    <circle cx="520" cy="255" r="9" fill="#7fb99a" stroke="#ffffff" stroke-width="3"/>
    <text x="565" y="248" font-size="17" text-anchor="start">Algood</text>

    <!-- Monterey -->
    <circle cx="615" cy="290" r="9" fill="#7fb99a" stroke="#ffffff" stroke-width="3"/>
    <text x="615" y="325" font-size="17" text-anchor="middle">Monterey</text>
  </g>

  <text x="450" y="612" font-size="17" text-anchor="middle" fill="#5a6b76" font-family="Segoe UI, system-ui, sans-serif">
    Upper Cumberland, Tennessee — illustrative service region, not a coverage guarantee
  </text>
</svg>
