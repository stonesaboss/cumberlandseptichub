<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Septic pumping truck positioned beside a rural residential property">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ec7dd"/>
      <stop offset="1" stop-color="#d8e9f2"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5f9e59"/>
      <stop offset="1" stop-color="#4a8148"/>
    </linearGradient>
    <linearGradient id="tank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f7f9"/>
      <stop offset="0.55" stop-color="#d7dfe5"/>
      <stop offset="1" stop-color="#aebbc4"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- distant ridge -->
  <path d="M0 430 Q 200 340 430 400 T 900 380 T 1350 400 T 1600 370 V 560 H 0 Z" fill="#7ba8bf" opacity="0.55"/>
  <path d="M0 480 Q 260 400 520 450 T 1050 440 T 1600 430 V 620 H 0 Z" fill="#5d8ba3" opacity="0.5"/>

  <!-- tree line -->
  <g fill="#2e5d3c">
    <path d="M60 470 l38 -90 38 90 z"/><path d="M120 480 l32 -74 32 74 z"/>
    <path d="M1180 460 l40 -95 40 95 z"/><path d="M1258 472 l34 -80 34 80 z"/>
    <path d="M1340 466 l42 -100 42 100 z"/><path d="M1430 478 l34 -78 34 78 z"/>
    <path d="M1510 470 l38 -88 38 88 z"/>
  </g>
  <g fill="#38714a">
    <path d="M20 500 l34 -78 34 78 z"/><path d="M190 496 l30 -68 30 68 z"/>
    <path d="M1230 498 l36 -84 36 84 z"/><path d="M1395 500 l32 -76 32 76 z"/>
    <path d="M1495 502 l36 -80 36 80 z"/>
  </g>

  <!-- farmhouse -->
  <g>
    <rect x="235" y="415" width="230" height="130" fill="#e9edef"/>
    <path d="M220 415 L350 330 L480 415 Z" fill="#7c383a"/>
    <rect x="262" y="450" width="44" height="44" fill="#33586e"/>
    <rect x="262" y="450" width="44" height="44" fill="none" stroke="#f4f7f9" stroke-width="4"/>
    <line x1="284" y1="450" x2="284" y2="494" stroke="#f4f7f9" stroke-width="3"/>
    <rect x="392" y="450" width="44" height="44" fill="#33586e"/>
    <rect x="392" y="450" width="44" height="44" fill="none" stroke="#f4f7f9" stroke-width="4"/>
    <line x1="414" y1="450" x2="414" y2="494" stroke="#f4f7f9" stroke-width="3"/>
    <rect x="328" y="462" width="46" height="83" fill="#5a3c30"/>
    <rect x="410" y="345" width="20" height="52" fill="#8a4446"/>
  </g>

  <!-- ground -->
  <rect y="545" width="1600" height="355" fill="url(#grass)"/>
  <path d="M0 545 Q 400 528 800 545 T 1600 545 V 570 H 0 Z" fill="#679c58" opacity="0.7"/>

  <!-- gravel drive -->
  <path d="M520 900 L640 560 H 960 L1120 900 Z" fill="#c9c2b4"/>
  <path d="M560 900 L665 575 H 935 L1070 900 Z" fill="#d8d2c5"/>

  <!-- septic access at lawn -->
  <ellipse cx="1345" cy="785" rx="120" ry="34" fill="#3f6f3e"/>
  <ellipse cx="1345" cy="778" rx="58" ry="18" fill="#5b4632"/>
  <ellipse cx="1345" cy="773" rx="46" ry="13" fill="#2f5e46"/>
  <ellipse cx="1345" cy="771" rx="34" ry="9" fill="#22432f"/>

  <!-- hose from truck to access -->
  <path d="M1010 700 C 1120 730 1220 760 1315 770" fill="none" stroke="#2f8f55" stroke-width="16" stroke-linecap="round"/>
  <path d="M1010 700 C 1120 730 1220 760 1315 770" fill="none" stroke="#1e643c" stroke-width="5" stroke-dasharray="2 26" stroke-linecap="round"/>

  <!-- septic vacuum truck -->
  <g>
    <!-- chassis -->
    <rect x="560" y="672" width="470" height="30" rx="8" fill="#25333d"/>
    <!-- tank body -->
    <rect x="575" y="560" width="330" height="122" rx="58" fill="url(#tank)" stroke="#8fa0ac" stroke-width="3"/>
    <ellipse cx="905" cy="621" rx="30" ry="61" fill="#c3ced6" stroke="#8fa0ac" stroke-width="3"/>
    <line x1="655" y1="562" x2="655" y2="680" stroke="#9fb0ba" stroke-width="4"/>
    <line x1="740" y1="562" x2="740" y2="680" stroke="#9fb0ba" stroke-width="4"/>
    <line x1="825" y1="562" x2="825" y2="680" stroke="#9fb0ba" stroke-width="4"/>
    <!-- hatch -->
    <rect x="700" y="536" width="60" height="26" rx="10" fill="#8fa0ac"/>
    <!-- rear valve -->
    <rect x="925" y="640" width="34" height="20" rx="6" fill="#546471"/>
    <circle cx="965" cy="650" r="14" fill="#2f8f55"/>
    <!-- cab -->
    <path d="M940 682 V 588 q0 -14 14 -14 h 66 q 12 0 18 10 l 34 58 q 6 10 6 22 v 18 z" fill="#f4f7f9" stroke="#8fa0ac" stroke-width="3"/>
    <path d="M962 592 h 52 l 26 46 h -78 z" fill="#33586e"/>
    <rect x="940" y="662" width="138" height="20" fill="#25333d"/>
    <!-- fenders + wheels -->
    <g fill="#1d2a32">
      <circle cx="640" cy="712" r="42"/>
      <circle cx="742" cy="712" r="42"/>
      <circle cx="1020" cy="712" r="42"/>
    </g>
    <g fill="#8fa0ac">
      <circle cx="640" cy="712" r="20"/>
      <circle cx="742" cy="712" r="20"/>
      <circle cx="1020" cy="712" r="20"/>
    </g>
    <g fill="#546471">
      <circle cx="640" cy="712" r="8"/>
      <circle cx="742" cy="712" r="8"/>
      <circle cx="1020" cy="712" r="8"/>
    </g>
  </g>

  <!-- foreground grass tufts -->
  <g stroke="#3f6f3e" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M120 860 q 6 -28 0 -44 M136 862 q 10 -22 2 -40 M106 858 q -8 -20 -2 -36"/>
    <path d="M1540 850 q 6 -28 0 -44 M1556 852 q 10 -22 2 -40 M1526 848 q -8 -20 -2 -36"/>
    <path d="M480 878 q 6 -26 0 -40 M496 880 q 10 -20 2 -36"/>
  </g>
</svg>
